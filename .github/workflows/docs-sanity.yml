name: Docs Sanity

on:
  push:
    branches:
      - main
      - master
      - "codex/**"
  pull_request:

jobs:
  docs-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Run docs sanity check
        run: npm run docs:check

